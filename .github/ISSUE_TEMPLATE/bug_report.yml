name: Bug Report
description: Report a bug in Brain Ecosystem
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of Brain are you using?
      placeholder: e.g., 2.3.0
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - brain
        - trading-brain
        - marketing-brain
        - brain-core
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g., 20.11.0
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., macOS 14.2, Windows 11, Ubuntu 22.04
